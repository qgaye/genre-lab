<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Genre Lab · 歌单曲风分析</title>
    <link rel="stylesheet" href="/styles.css?v=20260716-cover-proxy">
  </head>
  <body>
    <main class="shell shell-playlist">
      <section class="console" aria-label="歌单曲风分析工作台" data-i18n-aria="console.aria">
        <header class="mast">
          <div>
            <p class="kicker">Genre Lab</p>
            <h1 data-i18n="pl.title">我的音乐品味</h1>
          </div>
          <div class="mast-actions">
            <div class="mast-buttons">
              <a class="lang-toggle" href="/index.html" data-i18n="pl.nav.single">单曲</a>
              <button type="button" class="lang-toggle" id="langToggle" data-i18n="lang.toggle">EN</button>
            </div>
            <div class="status-pill" id="statusPill" data-i18n="pl.status.waiting">等待输入</div>
          </div>
        </header>

        <form class="input-grid" id="playlistForm">
          <label class="query-field model-field">
            <span data-i18n="field.model">曲风模型</span>
            <select id="modelSelect"></select>
          </label>
          <label class="query-field">
            <span data-i18n="pl.field.link">网易云歌单链接</span>
            <input id="playlistInput" autocomplete="off" placeholder="例如：https://music.163.com/playlist?id=13856318070" data-i18n-ph="pl.field.linkPlaceholder">
          </label>
          <div class="parsed-line" id="parsedLine" data-i18n="pl.parsed.default">粘贴网易云歌单链接，将遍历每首歌进行 Essentia 音频分析并查询 iTunes / Discogs / Last.fm 曲风</div>
          <div class="actions">
            <button type="submit" class="primary" id="analyzeBtn" data-i18n="pl.action.analyze">分析歌单</button>
          </div>
          <div class="progress-card" id="progressCard">
            <div class="progress-top">
              <span id="progressLabel" data-i18n="pl.progress.ready">准备就绪</span>
              <b id="progressPercent">0%</b>
            </div>
            <div class="progress-track"><span id="progressFill"></span></div>
            <ol class="progress-log" id="progressLog"></ol>
          </div>
        </form>
      </section>

      <section class="result-board result-board-playlist" id="resultBoard" aria-live="polite">
        <article class="verdict">
          <div class="verdict-top">
            <p data-i18n="pl.overview">歌单概览</p>
          </div>
          <p id="playlistMeta" class="playlist-meta" data-i18n="pl.overview.empty">粘贴一个网易云歌单链接开始逐曲分析。</p>
          <div class="genre-2l" id="genreTwoLevel" hidden>
            <div class="view-toggle" id="viewToggle" role="tablist" aria-label="曲风视图切换" data-i18n-aria="pl.view.aria">
              <button type="button" class="view-toggle-btn" data-view="sunburst" role="tab" aria-selected="false" data-i18n="pl.view.sunburst">旭日图</button>
              <button type="button" class="view-toggle-btn is-active" data-view="mosaic" role="tab" aria-selected="true" data-i18n="pl.view.mosaic">占比矩阵</button>
              <button type="button" class="view-toggle-btn" data-view="nebula" role="tab" aria-selected="false" data-i18n="pl.view.nebula">曲风星云</button>
            </div>
            <div class="chart-style-toggle" id="chartStyleToggle" role="group" aria-label="图表风格切换" data-i18n-aria="pl.style.aria">
              <button type="button" class="chart-style-btn is-active" data-style="classic" aria-pressed="true" data-i18n="pl.style.classic">经典</button>
              <button type="button" class="chart-style-btn" data-style="studio" aria-pressed="false" data-i18n="pl.style.studio">Studio</button>
            </div>
            <figure class="genre-sunburst" id="genreSunburst" hidden>
              <figcaption data-i18n="pl.sunburst.caption">曲风构成 · 内环流派 / 外环子风格</figcaption>
              <div class="sunburst-layout">
                <div class="sunburst-stage">
                  <svg viewBox="0 0 224 224" id="sunburstSvg" aria-hidden="true"></svg>
                  <div class="sunburst-center" id="sunburstCenter"></div>
                </div>
                <div class="sunburst-legend" id="sunburstLegend"></div>
              </div>
            </figure>
            <figure class="genre-mosaic" id="genreMosaic">
              <figcaption class="mosaic-caption">
                <span data-i18n="pl.mosaic.caption">占比矩阵 · 面积即占比 / 同色同流派</span>
                <button type="button" id="shareMosaic" class="verdict-share" title="生成占比矩阵图片并预览" data-i18n-title="pl.share.title" disabled>
                  <span class="verdict-share-icon" aria-hidden="true">↗</span>
                  <span class="verdict-share-label" data-i18n="pl.share.button">分享</span>
                </button>
              </figcaption>
              <div class="mosaic-stage" id="mosaicStage"></div>
            </figure>
            <figure class="genre-nebula" id="genreNebula" hidden>
              <figcaption class="nebula-caption">
                <span data-i18n="pl.nebula.caption">曲风星云 · 每簇一个子风格 / 同色同流派</span>
              </figcaption>
              <div class="nebula-stage" id="nebulaStage">
                <canvas id="nebulaCanvas"></canvas>
                <div class="nebula-legend" id="nebulaLegend"></div>
              </div>
            </figure>
          </div>
        </article>

        <article class="panel playlist-panel">
          <div class="panel-head">
            <h3 data-i18n="pl.tracks.title">逐曲曲风占比</h3>
            <span id="trackCount">0 首</span>
          </div>
          <div class="track-list" id="trackList"></div>
        </article>
      </section>
    </main>

    <template id="trackCardTemplate">
      <div class="track-card">
        <div class="track-card-head">
          <div class="track-card-title">
            <span class="track-index"></span>
            <div class="track-card-name">
              <strong></strong>
              <small></small>
            </div>
          </div>
          <span class="track-status">排队中</span>
        </div>
        <div class="track-card-body"></div>
      </div>
    </template>

    <div class="style-dialog" id="styleDialog" aria-hidden="true">
      <div class="style-dialog__backdrop" data-style-dialog-close></div>
      <section class="style-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="styleDialogTitle">
        <button class="style-dialog__close" type="button" data-style-dialog-close aria-label="关闭曲风详情" data-i18n-aria="dialog.close">×</button>
        <p class="style-dialog__kicker" id="styleDialogKicker" data-i18n="dialog.kicker">Discogs Style</p>
        <h2 id="styleDialogTitle"></h2>
        <div class="style-dialog__toolbar">
          <span id="styleDialogTrackCount"></span>
          <button class="style-dialog__info-toggle" id="styleDialogInfoToggle" type="button" aria-expanded="false" aria-controls="styleDialogInfoPanel" aria-label="展开曲风介绍" data-i18n-aria="dialog.info.toggle" title="展开曲风介绍" data-i18n-title="dialog.info.toggle">i</button>
        </div>
        <div class="style-dialog__content">
          <div class="style-dialog__tracks" id="styleDialogTrackList" aria-label="关联歌曲" data-i18n-aria="dialog.associated"></div>
          <div class="style-dialog__info" id="styleDialogInfoPanel" hidden>
            <button class="style-dialog__back" id="styleDialogInfoBack" type="button" data-i18n="dialog.info.back">返回歌曲</button>
            <p class="style-dialog__overview" id="styleDialogOverview"></p>
            <div class="style-dialog__section">
              <h3 data-i18n="dialog.focus">风格重点</h3>
              <ul id="styleDialogFocus"></ul>
            </div>
            <div class="style-dialog__section">
              <h3 data-i18n="dialog.history">发展脉络</h3>
              <p id="styleDialogHistory"></p>
            </div>
            <div class="style-dialog__entry">
              <span data-i18n="dialog.entry">主流入门音乐</span>
              <strong id="styleDialogTrack"></strong>
              <small id="styleDialogTrackNote"></small>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="share-preview" id="sharePreview" aria-hidden="true">
      <div class="share-preview__backdrop" data-share-preview-close></div>
      <section class="share-preview__panel" role="dialog" aria-modal="true" aria-labelledby="sharePreviewTitle" aria-describedby="sharePreviewHint">
        <div class="share-preview__top">
          <div>
            <p class="share-preview__kicker">Genre Lab</p>
            <h2 id="sharePreviewTitle" data-i18n="pl.preview.title">占比矩阵已生成</h2>
          </div>
          <button class="share-preview__close" type="button" data-share-preview-close aria-label="关闭占比矩阵预览" data-i18n-aria="pl.preview.close">×</button>
        </div>
        <div class="share-preview__image-wrap">
          <img id="sharePreviewImage" alt="Genre Lab 占比矩阵图片" data-i18n-alt="pl.preview.alt">
        </div>
        <p class="share-preview__hint" id="sharePreviewHint" data-i18n="pl.preview.hint">长按图片，选择“保存图片”或“添加到照片”。</p>
      </section>
    </div>

    <script src="/discogs-taxonomy.js"></script>
    <script src="/discogs-style-profiles.js"></script>
    <script src="/genre-core.js"></script>
    <script src="/playlist.js?v=20260716-cover-proxy"></script>
  </body>
</html>
